version: "3.9"

services:
  api:
    build: .
    image: soil-no3-prediction:latest
    ports:
      - "8000:8000"
    volumes:
      # Mount your trained model artifacts here (output of train.py)
      - ./model:/app/model:ro
    environment:
      - MODEL_DIR=/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
